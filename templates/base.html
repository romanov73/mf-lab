<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Виртуальная лаборатория МФ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!--JQuery-3.6.0 полезная штука-->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!--Это файловый браузер. Стандартный... Ну скажем так о нём либо молча, либо никак-->
    <script src="https://unpkg.com/filepond@4.30.6/dist/filepond.js"></script>
    <link href="https://unpkg.com/filepond@4.30.6/dist/filepond.css" rel="stylesheet" />
    <!--Это ссылка на стили для селектора выбора курсов. Огромное человеческое спасибо всем причастным к его созданибю. Просто замечательная и очень простая в работе вещь. Не стыдно и ссылку на них добавить https://slimselectjs.com-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/slim-select/2.8.0/slimselect.min.css" integrity="sha512-QhrDqeRszsauAfwqszbR3mtxV3ZWp44Lfuio9t1ccs7H15+ggGbpOqaq4dIYZZS3REFLqjQEC1BjmYDxyqz0ZA==" crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</head>
<body class="d-flex flex-column min-vh-100" >
    <nav class="navbar navbar-expand-md navbar-light rounded-bottom-2" style="background-color: rgb(0, 72, 144)">
        <a class="ps-4 navbar-brand text-light" href="{% url 'main' %}">Виртуальная лаборатория МФ</a>
        <button class="navbar-toggler me-1" style="background-color: white" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav ms-md-auto">
                <li class="nav-item"><a class="nav-link text-light text-decoration-underline text-center" href="{% url 'courses' %}">Список курсов</a></li>
                {% if request.user.is_teacher %}
                <li class="nav-item"><a class="nav-link text-light text-decoration-underline text-center" href="{% url 'create_course' %}">Создать курс</a></li>
                {% endif %}
                <li class="nav-item pe-md-5"><a class="nav-link text-light text-decoration-underline text-center" href="{% url 'logout' %}">Выход</a></li>
            </ul>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>

    <footer class="text-center mt-auto" style="background-color: rgb(13, 45, 79); min-height: 3em">
        <p class="text-light mt-3" style="font-size: 14px">© 2024, Виртуальная лаборатория МФ</p>
    </footer>
    {% block scripts %} {% endblock %}
</body>
</html>
