{% extends 'base.html' %} {% block content %}
<div class="d-flex mb-3 justify-content-between">
  <span class="d-inline-block fw-bold h5">Лабораторные работы:</span>
</div>

<div class="bg-light px-2 py-1">
  {% for lab in labs %}
  <div
    class="border border-primary rounded bg-white p-3 mb-3 d-flex justify-content-between align-items-center"
  >
    <span class="me-3">{{ lab.title }}</span>
    <a
      href="{% url 'lab_page' lab_id=lab.id %}"
      class="btn btn-outline-primary btn-sm"
      >Открыть</a
    >
  </div>
  {% endfor %}
</div>
{% endblock %}
