{% extends 'base.html' %}

{% block content %}
<h5>{{creating_title}}</h5>

<form id="my_form" enctype="multipart/form-data" method="post" action="{{creating_url}}" >
    {% csrf_token %}
    <div class="mb-3">
        <label for="" class="form-label">Название:</label>
        <input type="text" class="form-control border-black" name="name" required
            value="{{object_name}}"
        />
    </div>
    <div class="mb-3">
        <label for="" class="form-label">Краткое описание:</label>
        <input type="text" class="form-control border-black" name="summary"
            value="{{object_summary}}"
        />
    </div>
    {% if groups != null %}
    <div class="mb-3">
        <input name="groups" type="text" hidden />
        <select class="form-control" id="country" multiple >  
            {% for group in groups %}
            <option value="{{group.id}}" {% if my_groups != null and group.id in my_groups %} selected {% endif %}
            >{{group.name}}</option>
            {% endfor %}
         </select>
    </div>
    {% endif %}

    <div class="mb-3">
        <label for="" class="form-label">Описание:</label>
        <textarea  id="editor" name="text" class=" border-black">
            {{object_description}}
        </textarea>
    </div>
    <div class="mb-1 form-file">
        <input class="filepond" type="file" name="attachments" multiple="multiple" id="InputFiles">
    </div>
    <div class="d-flex justify-content-end mb-4">
        {% if task_id %}
        <a class="btn btn-outline-primary align-self-end me-2" href="{% url 'task_formulas' task_id=task_id %}">Перейти к формулам</a>
        {% elif course_id %}
        <a class="btn btn-outline-primary align-self-end me-2" href="{% url 'course-tasks' course_id=course_id %}">Перейти к лабораторным</a>
        {% endif %}
        <input class="btn btn-primary align-self-end " type="submit"
            value="{{button_text}}"
        />
    </div>
</form>
<script src="https://cdnjs.cloudflare.com/ajax/libs/slim-select/2.8.0/slimselect.min.js" integrity="sha512-mG8eLOuzKowvifd2czChe3LabGrcIU8naD1b9FUVe4+gzvtyzSy+5AafrHR57rHB+msrHlWsFaEYtumxkC90rg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script>
    var $crf_token = $('[name="csrfmiddlewaretoken"]').attr('value');

    var editor = new FroalaEditor('#editor',
    {
        //Это те инсрументы, которые используются
        toolbarButtons:[
            ['formatUL','formatOL', 'outdent', 'indent'],
            ['insertLink'],
            ['emoticons', 'insertImage']
        ],
        lineHeights:{
            Double:1
        },
        language:'ru',
        placeholderText : "",
        quickInsertEnabled:false,
        imageUploadURL: '/fp/image/',
        imageUploadMethod: 'POST',
        imageAllowedTypes: ['jpeg', 'jpg', 'png'],
        requestHeaders: {
            "X-CSRFToken": $crf_token
        }
    });

    FilePond.setOptions({
        server: {
            url: '/fp',
            process:{
                url:'/process/',
                ode: 'same-origin',
                headers: {"X-CSRFToken": $crf_token},
            },
            patch:{
                url: '/patch/',
                ode: 'same-origin',
                headers: {"X-CSRFToken": $crf_token},
            },
            revert: {
                url:  '/revert/',
                ode: 'same-origin',
                headers: {"X-CSRFToken": $crf_token},
            },
            fetch:{
                url:  '/fetch/?target=',
                ode: 'same-origin',
                headers: {"X-CSRFToken": $crf_token},
            }, 
            load:{
                url: '/load/',
                ode: 'same-origin',
                headers: {"X-CSRFToken": $crf_token},
            }
        },
        allowMultiple: true,
        name:"attachments"
    })

    const pond = FilePond.create(document.querySelector('#InputFiles'),{
        files: [
            {% for id in files %}
            {
                // the server file reference
                source: '{{id}}',
    
                // set type to limbo to tell FilePond this is a temp file
                options: {
                    type: 'limbo',
                },
            },
            {% endfor %}
        ],
    })

    {% if groups != null %}
    const select = new SlimSelect({
        select: "#country",
        settings: {
            closeOnSelect: false,
            placeholderText: 'Выберите группы, для которых создаётся курс'
          },
     });
    {% endif %}

    $('#my_form').on('submit', function() {
        {% if groups != null %}
            var GroupsInputs = $("input[name='groups']")
            var selected = select.getSelected();
            console.log(selected)
            if(selected.length == 0){
                alert("Необходимо выбрать хотя бы одну группу")
                return false;
            }
            GroupsInputs[0].value = selected.join("|")
        {% endif %}
        var AttchmentInputs = $("input[name='attachments']")
        if (AttchmentInputs.length > 0){
            var total = `${AttchmentInputs[0].value}`
            for (var i = 1; i < AttchmentInputs.length; i++) {
                total += `|${AttchmentInputs[i].value}`
            }
            AttchmentInputs[0].name+="[]"
            AttchmentInputs[0].value = total
        }
        return true
    });
</script>
<style>
    #country {
        height: 35px;
        max-width: 400px;
    }
</style>
{% endblock %}
