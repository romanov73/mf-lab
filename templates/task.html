{% extends 'base.html' %}

{% block content %}

<div class="mb-3">
    <div class="row align-items-start">
        <div class="col mb-3">
            <p class="h5">Лабораторная работа: "{{task.name}}" </p>
            <div class="text-muted text mb-0">{{ task.description | safe }}</div>
            {% for file in files %}
            <div class="border p-3">
                <a download="{{ file.file_name }}" href='{% url "get_file" file_id=file.id %}'>{{ file.file_name }}</a>
            </div>
            {% endfor %}
        </div>
    </div>
</div>

<div class="d-flex mb-5">
    <input class="btn btn-primary ms-auto" type="submit" value="Перейти к практике"/>
</div>




{% endblock %}
