{% extends 'base.html' %}

{% block content %}

<div class="mb-3">
    <div class="row align-items-start">
        <div class="col mb-3">
            <p class="h5">Лабораторная работа: "{{task.name}}" </p>
            <div class="text-muted text mb-0">{{ task.description | safe }}</div>
            {% if main_pdf %}
                <iframe
                    src='{% url "get_pdf" file_id=main_pdf.id %}'
                    width="100%"
                    height="600px">
                </iframe>
            {% endif %}
            {% for file in files %}
            <div class="border p-3">
                <a download="{{ file.file_name }}" href='{% url "get_file" file_id=file.id %}'>{{ file.file_name }}</a>
            </div>
            {% endfor %}
        </div>
    </div>
</div>

<div class="d-flex mb-5">
    <a class="btn btn-primary ms-auto" href="{% url 'task_practice' task_id=task.id %}">Перейти к практике</a>
</div>




{% endblock %}
