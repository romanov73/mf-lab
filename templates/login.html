<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Виртуальная лаборатория МФ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-image: url('https://ulstu.ru/upload/iblock/d8a/jvwtgsjp822letkyex9j2i7yvsx7d7l0/ulgtu.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
        }
    </style>
</head>
<body>
    <div class="container-fluid h-100">
        <div class="row h-100 justify-content-start ">
            <div class="col-md-4 bg-white p-5 rounded shadow h-100">
                <h2 class="text-center mb-4">Виртуальная лаборатория МФ</h2>
                <h4 class="text-center mb-4">Вход</h4>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <input type="text" class="form-control" id="username" name="username" placeholder="Логин" required>
                    </div>
                    <div class="mb-3">
                        <input type="password" class="form-control" id="password" name="password" placeholder="Пароль" required>
                    </div>
                    <h6 class="text-center mb-4 text-danger"> {{ message }} </h6>
                    <button type="submit" class="btn btn-primary w-100">Войти</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
